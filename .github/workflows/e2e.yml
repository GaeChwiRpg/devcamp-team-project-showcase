name: E2E (Playwright)

# 책 9주차 06 — Playwright MCP 시나리오를 CI에서 자동 실행

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build & start app (background)
        run: |
          ./gradlew bootJar
          java -jar build/libs/*-SNAPSHOT.jar &
          # 8080 포트 바인딩 대기
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health >/dev/null; then break; fi
            sleep 1
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: tests/e2e
        run: npx playwright test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

name: E2E (Playwright)

# 책 9주차 06 — Playwright MCP 시나리오를 CI에서 자동 실행

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build app
        run: ./gradlew bootJar --no-daemon

      - name: Start app (background)
        run: |
          nohup java -jar build/libs/*-SNAPSHOT.jar > app.log 2>&1 &
          echo $! > app.pid
          # actuator/health 가 200 OK 응답할 때까지 최대 90초 대기
          for i in {1..90}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health || echo "000")
            if [ "$code" = "200" ]; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "App failed to start in 90s. Recent log:"
          tail -100 app.log
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Run E2E
        working-directory: tests/e2e
        run: npx playwright test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report
          retention-days: 7

name: AI Review (Claude)

# Claude GitHub Actions Review
# PR 열림/업데이트 시 자동 트리거. 팀 CLAUDE.md를 prompt로 전달해 팀 룰 강제.
#
# 설정 필요:
# - Repository secrets에 ANTHROPIC_API_KEY 등록 (https://console.anthropic.com/)
# - 자동 트리거 + 수동(workflow_dispatch) 모두 지원

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write   # OIDC 토큰 발급 (anthropics/claude-code-action 요구)

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ANTHROPIC_API_KEY secret이 없으면 자동 스킵 (시연 환경에서 PR이 빨갛게 표시되지 않게).
      - name: Check secret presence
        id: check_secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY secret 미등록. AI 리뷰 step을 건너뜁니다. https://console.anthropic.com/ 에서 키 발급 후 Repo > Settings > Secrets에 ANTHROPIC_API_KEY 등록하세요."
          fi

      - name: Claude Review
        if: steps.check_secret.outputs.present == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            🤖 **운영 티켓 시스템 팀 AI 시니어 리뷰어**

            **팀 헌법 (CLAUDE.md 핵심):**
            - 3계층 분리 엄격 (Controller/Service/Repository)
            - @Transactional은 Service 묶음 메서드에만 (Controller 절대 X, single-read X)
            - LAZY 기본, N+1 발견 시 @EntityGraph 적용
            - 동시 변경 메서드는 PESSIMISTIC_WRITE 락
            - 캐시는 변경 빈도 << 조회 빈도인 endpoint만
            - API 변경 시 API-CONTRACT.md 동반 갱신
            - 비밀 정보 (.env, JWT secret) commit 절대 금지

            **리뷰 형식:**
            - 잘한 점 1~2개 (있으면)
            - 개선 권장 (max 5개, severity: info/suggestion/important)
            - 한국어로 작성, 비전공자도 이해 가능한 톤

            **금지:**
            - 응답시간/throughput 추정값 만들어내기
            - 팀이 학습하지 않은 패턴 권유 (Spring Boot 3.3 + Java 21 범위 안에서)

          claude_args: |
            --model claude-3-5-sonnet-20241022
            --max-turns 2

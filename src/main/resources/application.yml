spring:
  application:
    name: ticket-system
  profiles:
    default: local

  datasource:
    url: ${DB_URL:jdbc:h2:mem:ticketdb;MODE=MySQL;DB_CLOSE_DELAY=-1}
    driver-class-name: org.h2.Driver
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
        # 학습/디버깅 시에만 켜기
        # show_sql: true
  cache:
    type: simple   # 시연용. 운영은 redis로 전환.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  sql:
    init:
      mode: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches,prometheus
  endpoint:
    health:
      show-details: always

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    co.dingcodingco: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-in-production-please}
    expiration-ms: 86400000   # 24h

  ai:
    # Claude API 호출은 시연 단계에서 stub. 실제 통합은 Phase 3에서.
    enabled: false
    api-key: ${ANTHROPIC_API_KEY:}
